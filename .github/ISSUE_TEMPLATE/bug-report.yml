name: Bug Report
description: Report a problem with the installer
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report. Please provide as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Installer version
      description: What version or commit of the installer are you using?
      placeholder: "e.g., main branch, commit abc1234"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What OS are you installing on?
      multiple: false
      options:
        - Ubuntu 22.04
        - Ubuntu 24.04
        - Debian 11
        - Debian 12
        - CentOS 7
        - CentOS 8
        - CentOS 9
        - Rocky Linux 8
        - Rocky Linux 9
        - AlmaLinux 8
        - AlmaLinux 9
        - Other (specify below)
    validations:
      required: true

  - type: dropdown
    id: install-type
    attributes:
      label: Installation Type
      description: What are you trying to install?
      multiple: false
      options:
        - Panel only
        - Wings only
        - Elytra only (legacy)
        - Both (panel + Wings)
        - Both (panel + Elytra, legacy)
        - Other
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: "The installer should have..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
      placeholder: "Instead, the installer..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue
      placeholder: |
        1. Run `bash <(curl -sSL ...)`
        2. Select option 1
        3. Enter FQDN
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant logs from `/var/log/hydrodactyl-*.log` or terminal output
      render: shell

  - type: textarea
    id: system-info
    attributes:
      label: System information
      description: Run `uname -a`, `free -h`, and `df -h` and paste the output
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Verification
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I am using the latest version of the installer
          required: true
