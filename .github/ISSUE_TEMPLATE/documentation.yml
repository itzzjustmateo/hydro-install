name: Documentation Improvement
description: Suggest an improvement to the documentation
labels: ["type: docs"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the documentation!

  - type: dropdown
    id: doc-type
    attributes:
      label: Documentation type
      multiple: false
      options:
        - README
        - Manual guide
        - Code comments
        - Error messages
        - Other
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current state
      description: What is currently incorrect, unclear, or missing?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: How should it be improved?
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Verification
      options:
        - label: I have searched existing issues for duplicates
          required: true
