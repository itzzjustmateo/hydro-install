name: Performance Issue
description: Report a performance problem with the installer or installed services
labels: ["type: performance"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a performance issue. Please provide system details.

  - type: input
    id: specs
    attributes:
      label: System specifications
      description: CPU, RAM, disk type (SSD/HDD), virtualization type
      placeholder: "4 vCPU, 8 GB RAM, SSD, KVM"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Performance description
      description: What is slow or underperforming?
    validations:
      required: true

  - type: textarea
    id: metrics
    attributes:
      label: Performance metrics
      description: Paste output from `top`, `free -h`, `iostat`, or relevant monitoring
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other relevant information

  - type: checkboxes
    id: checks
    attributes:
      label: Verification
      options:
        - label: I have searched existing issues for duplicates
          required: true
